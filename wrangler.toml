# hellodk.io — Workers Builds (wrangler deploy, not pages deploy)
# Build token has Workers Scripts Edit; Pages API token is not required.
name = "cfpages"
compatibility_date = "2024-06-01"
main = ".worker-build/index.js"

[assets]
directory = "./dist"
not_found_handling = "404-page"
run_worker_first = ["/api/*"]

[ai]
binding = "AI"

[observability.logs]
enabled = true
invocation_logs = true

# Optional — enable in dashboard or uncomment after verifying in CF UI:
# [observability.traces]
# enabled = true
# head_sampling_rate = 1
